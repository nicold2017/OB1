name: Claude PR Review

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number to review
        required: true
        type: number
      extra_focus:
        description: Optional extra review focus for this run
        required: false
        type: string

concurrency:
  group: claude-pr-review-${{ inputs.pr_number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  claude-review:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch PR branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ inputs.pr_number }}
        run: |
          set -euo pipefail

          gh pr view "$PR_NUMBER" \
            --repo "$GITHUB_REPOSITORY" \
            --json state,isDraft,title,url

          pr_state=$(gh pr view "$PR_NUMBER" \
            --repo "$GITHUB_REPOSITORY" \
            --json state \
            --jq '.state')

          if [ "$pr_state" != "OPEN" ]; then
            echo "PR #$PR_NUMBER is not open."
            exit 1
          fi

          git fetch origin "pull/$PR_NUMBER/head:pr-$PR_NUMBER"
          git checkout "pr-$PR_NUMBER"

      - name: Run Claude review
        uses: anthropics/claude-code-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ inputs.pr_number }}
            EXTRA REVIEW FOCUS: ${{ inputs.extra_focus }}

            You are reviewing a contribution to Open Brain (OB1), an open-source
            persistent AI memory system. Read CLAUDE.md, CONTRIBUTING.md, and
            SOUL.md (if it exists) for full project context.

            Review this PR for:
            1. Alignment with OB1's mission and contribution categories
            2. Clarity for contributors following the README instructions
            3. Completeness of README, metadata, and user guidance
            4. Safety: no secrets, no destructive SQL, no core schema breakage,
               no local MCP servers
            5. Value: whether this adds something meaningfully useful
            6. Design patterns: direct Supabase insert or MCP ingest endpoint,
               remote Edge Functions, RLS on new tables, JSONB metadata fields,
               env vars for credentials
            7. Scope fit: whether this belongs in OB1 or is drifting into its
               own standalone project

            The mechanical checks are already handled by a separate CI job.
            Focus on judgment-heavy review: clarity, alignment, value, design
            patterns, scope fit, and quality.

            Review behavior:
            - Use `gh pr diff` and `gh pr view` for PR context.
            - Use inline comments only for specific, actionable findings.
            - Submit one final GitHub PR review with `gh pr review`.
            - Be conservative with approvals. Approve only when there are no
              substantive concerns left.
            - If there are blocking issues, request changes and explain them
              clearly.
            - If feedback is non-blocking, submit a comment review instead of
              cluttering the thread with extra top-level comments.
            - Do not output the review as chat text. Put the feedback on GitHub.
          claude_args: |
            --model haiku --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr diff:*),Bash(gh pr review:*),Bash(gh pr view:*),Bash(git diff:*),Bash(git status:*)"
